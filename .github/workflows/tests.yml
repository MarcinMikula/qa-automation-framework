name: QA Framework Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Initialize local test data
        run: python testdata/testdb.py

      - name: Start local FastAPI services
        run: |
          python -m services.users.main &
          python -m services.orders.main &
          python -m services.products.main &
          sleep 5

      - name: Smoke check local services
        run: |
          python - <<'PY'
          import httpx

          urls = [
              "http://localhost:8001/health",
              "http://localhost:8002/health",
              "http://localhost:8003/health",
          ]

          for url in urls:
              response = httpx.get(url, timeout=10.0)
              response.raise_for_status()
              print(url, response.json())
          PY

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v -m "not external"

      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v -m "not external"
