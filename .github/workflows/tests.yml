name: QA Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalacja zależności
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Inicjalizacja bazy danych
        run: python testdata/testdb.py

      - name: Start mikroserwisów
        run: |
          python -m services.users.main &
          python -m services.orders.main &
          python -m services.products.main &
          sleep 3

      - name: Testy unit
        run: python -m pytest tests/unit/ -v

      - name: Testy integracyjne
        run: python -m pytest tests/integration/ -v

      - name: Testy E2E
        run: python -m pytest tests/e2e/ -v